<body>
  <main id="loginView" class="login-shell">
    <section class="login-panel glass">
      <div class="brand-lockup login-brand">
        <div class="brand-mark">CH</div>
        <div class="login-title-stack">
          <h1>Citi Homes</h1>
          <p class="login-subtitle">Administration System</p>
        </div>
      </div>
      <p class="login-copy">Source management dashboard for Operations, P&C and Administration, Recruitment, Attendance, Procurement and administration control.</p>
      <form id="loginForm" class="login-form" method="post" action="javascript:void(0)">
        <label>Email
          <input id="username" type="email" autocomplete="username" placeholder="admin@citihomes.ae" required>
        </label>
        <label>Password
          <span class="password-field">
            <input id="password" type="password" autocomplete="current-password" placeholder="Password" required>
            <button id="passwordToggle" type="button" aria-label="Hold to show password">Eye</button>
          </span>
        </label>
        <button type="submit">Login</button>
        <p id="loginMessage" class="form-message"></p>
      </form>
    </section>
  </main>

  <main id="appView" class="app-shell" hidden>
    <aside class="sidebar">
      <div class="brand-lockup compact">
        <div class="brand-mark">CH</div>

        </div>
      </div>
      <nav id="navList" class="nav-list"></nav>
      <button id="logoutButton" class="ghost-button">Logout</button>
    </aside>

    <section class="workspace">
      <header class="topbar glass">
        <div class="identity-panel">
          <strong id="roleLabel">Umer Raza</strong>
          <span id="accessLabel">Team Member</span>
        </div>
        <div class="top-title">
          <h2 id="pageTitle">Dashboard</h2>
        </div>
        <div class="table-search">
          <input id="globalSearch" placeholder="Search current table">
        </div>
        <div class="workspace-actions">
          <div id="dashboardMeta" class="dashboard-meta" hidden>
            <span id="abuDhabiTime">--:--</span>
            <span id="abuDhabiWeather">--°C</span>
          </div>
          <button id="refreshButton">Logout</button>
        </div>
      </header>

      <section id="dashboard" class="page-panel"></section>
      <section id="tablePage" class="page-panel" hidden>
        <div id="summaryCards" class="summary-grid"></div>
        <div id="pageTools" class="tool-row"></div>
        <div class="table-wrap glass">
          <table id="dataTable"></table>
        </div>
        <details id="addRecordPanel" class="add-panel glass">
          <summary>Add new record</summary>
          <form id="recordForm" class="record-form"></form>
        </details>
      </section>
    </section>
  </main>

  <script>
    (function () {
      function normalizeLogoutText() {
        var button = document.getElementById('refreshButton');
        if (button && button.textContent.trim() !== 'Logout') button.textContent = 'Logout';
      }
      function setupPasswordToggle() {
        var input = document.getElementById('password');
        var button = document.getElementById('passwordToggle');
        if (!input || !button || button.dataset.passwordReady === 'true') return;
        button.dataset.passwordReady = 'true';
        button.textContent = 'Eye';
        button.setAttribute('aria-label', 'Hold to show password');
        button.setAttribute('title', 'Hold to show password');
        function showPassword(event) { if (event) event.preventDefault(); input.type = 'text'; button.classList.add('password-visible'); }
        function hidePassword(event) { if (event) event.preventDefault(); input.type = 'password'; button.classList.remove('password-visible'); }
        button.addEventListener('pointerdown', showPassword);
        button.addEventListener('pointerup', hidePassword);
        button.addEventListener('pointercancel', hidePassword);
        button.addEventListener('pointerleave', hidePassword);
        button.addEventListener('blur', hidePassword);
        button.addEventListener('keydown', function (event) { if (event.key === ' ' || event.key === 'Enter') showPassword(event); });
        button.addEventListener('keyup', function (event) { if (event.key === ' ' || event.key === 'Enter') hidePassword(event); });
      }
      function refreshUiHelpers() { normalizeLogoutText(); setupPasswordToggle(); }
      function markActionButton(button) {
        if (!button || button.classList.contains('action-working') || button.classList.contains('action-done')) return;
        button.dataset.originalText = button.textContent.trim();
        button.classList.add('action-working');
        button.textContent = '';
        window.setTimeout(function () { button.classList.remove('action-working'); button.classList.add('action-done'); button.textContent = '✓'; }, 360);
      }
      document.addEventListener('click', function (event) {
        var button = event.target.closest('[data-save], [data-delete]');
        if (!button) return;
        markActionButton(button);
      }, true);
      refreshUiHelpers();
      new MutationObserver(refreshUiHelpers).observe(document.body, { childList: true, subtree: true });
    })();
  </script>
