name: Bootstrap Streamlit app
on:
  push:
    branches: [ main ]
permissions:
  contents: write
jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unpack app package
        shell: bash
        run: |
          cat > app_package.b64 <<'EOF'






































EOF
          base64 -d app_package.b64 > app_package.zip
          unzip -o app_package.zip
          rm -f app_package.b64 app_package.zip
          rm -f .github/workflows/bootstrap.yml
      - name: Commit app files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add Citi Homes P&C Streamlit app" || exit 0
          git push
