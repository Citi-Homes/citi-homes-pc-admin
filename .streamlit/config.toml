[theme]
base = "light"
primaryColor = "#242527"
backgroundColor = "#fffdf8"
secondaryBackgroundColor = "#f7f3ec"
textColor = "#242527"
linkColor = "#8d7344"
borderColor = "#ded7cb"
showWidgetBorder = true
showSidebarBorder = true
baseRadius = "6px"
buttonRadius = "4px"
font = "sans-serif"
headingFont = "sans-serif"
baseFontSize = 15
headingFontSizes = ["36px", "28px", "22px", "18px", "15px", "13px"]
headingFontWeights = [500, 500, 500, 500, 500, 500]
chartCategoricalColors = ["#242527", "#b99a5f", "#536b52", "#42546d", "#9f3f37", "#8d7344", "#6e665b"]
chartSequentialColors = ["#fffdf8", "#f7f3ec", "#ece4d7", "#ded7cb", "#d8c39a", "#b99a5f", "#8d7344", "#6b5640", "#3d3d3d", "#171717"]
dataframeBorderColor = "#ded7cb"
dataframeHeaderBackgroundColor = "#f1eadf"

[theme.sidebar]
backgroundColor = "#171717"
secondaryBackgroundColor = "#242527"
textColor = "#fffdf8"
primaryColor = "#d8c39a"
borderColor = "#4f4638"
